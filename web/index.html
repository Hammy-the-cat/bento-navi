<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="スポーツ遠征先で弁当が買える店をすぐに見つけるアプリ">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="べんとうナビ">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>べんとうナビ</title>
  <link rel="manifest" href="manifest.json">

  <!--
    Google AdSense: 審査通過後、下のスクリプトのコメントを外し、
    ca-pub-XXXXXXXXXXXXXXXX を自分のクライアントIDに書き換えると広告が配信されます。
    (lib/config/ad_config.dart の adsenseClient も同じIDに変更すること)
    ※IDが未取得のままコメントを外さないこと(表示崩れの原因になる)

  <script async
    src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX"
    crossorigin="anonymous"></script>
  -->

</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
